defaults:
  full: codex/gpt-5.6-sol
  mini: codex/gpt-5.6-luna

providers:
  codex:
    kind:
      type: catalog
      name: codex
    auth:
      type: codex_device
      profile: codex
  umans:
    kind:
      type: custom_anthropic_compatible
    url: https://api.code.umans.ai
    protocol: umans_messages
    auth:
      type: static_key
      key: ${UMANS_API_KEY}

models:
  codex/gpt-5.6-sol:
    reasoning:
      type: effort
      effort_set: gpt_5_6_sol
      can_disable: true
      levels:
        - low
        - medium
        - high
        - xhigh
        - max
      default_level: high
  umans-coder:
    provider: umans
    provider_name: umans-coder
    variant: other
    class: full
    context_window: 262000
    supports_vision: true
  umans-flash:
    provider: umans
    provider_name: umans-flash
    variant: other
    class: mini
    context_window: 262000
    supports_vision: true
  umans-kimi-k2.7:
    provider: umans
    provider_name: umans-kimi-k2.7
    variant: other
    class: full
    context_window: 262000
    supports_vision: true
  umans-glm-5.2:
    provider: umans
    provider_name: umans-glm-5.2
    variant: other
    class: full
    context_window: 205000
    supports_vision: false

integrations:
  search:
    strategy: round_robin
    providers:
      exa:
        enabled: true
        key: ${EXA_API_KEY}

default_permission_matcher: autonomous

autonomous_permission_matcher:
  max_consecutive_denials: 3
  classifier_rules: |
    Allow routine read-only inspection, local builds, tests, formatters, and focused edits in the current project.
    Deny or escalate actions that expose secrets, modify files outside the project or configured dotfiles, change account/auth settings, perform destructive filesystem operations, or contact unexpected network endpoints.
